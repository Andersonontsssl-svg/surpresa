<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Dia dos Namorados 💖</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ff4d6d, #ff99aa);
      color: white;
      text-align: center;
    }

    header {
      padding: 40px 20px;
      font-size: 34px;
      font-weight: bold;
    }

    .sub {
      font-size: 18px;
      margin-bottom: 20px;
    }

    .galeria {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      padding: 20px;
      max-width: 1100px;
      margin: auto;
    }

    .galeria img {
      width: 100%;
      height: 240px;
      object-fit: cover;
      border-radius: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      transition: transform 0.3s;
    }

    .galeria img:hover {
      transform: scale(1.05);
    }

    .mensagem {
      margin: 30px 20px;
      font-size: 20px;
    }

    .pedido {
      margin: 50px 20px;
      font-size: 28px;
      font-weight: bold;
      background: rgba(255,255,255,0.15);
      padding: 20px;
      border-radius: 15px;
      display: inline-block;
    }

    footer {
      margin-top: 40px;
      padding: 20px;
      font-size: 14px;
      opacity: 0.8;
    }
  </style>
</head>

<body>

  <header>
    Feliz Dia dos Namorados 💘
  </header>

  <div class="sub">
    Um site feito com todas as nossas memórias 💕
  </div>

  <div class="mensagem">
    Cada foto aqui representa um momento especial com você 💖
  </div>

  <div class="galeria">
    <img src="2A34405E-3911-4894-8263-45CC66AFB038.jpeg">
    <img src="3FD0D138-44AC-448C-81A1-61EFDAAFD035.jpeg">
    <img src="ACB7E092-0660-4BCE-8098-EE5DED814B5C.jpeg">
    <img src="IMG_2367.jpeg">
    <img src="IMG_2496.jpeg">
    <img src="IMG_3075.jpeg">
    <img src="IMG_3081.jpeg">
    <img src="IMG_3532.jpeg">
    <img src="IMG_3556.jpeg">
    <img src="IMG_3628.jpeg">
    <img src="IMG_4044.jpeg">
    <img src="IMG_4049.jpeg">
    <img src="IMG_5778.jpeg">
    <img src="IMG_5879.jpeg">
    <img src="IMG_6141.jpeg">
  </div>

  <div class="pedido">
    E no final de tudo... 💍<br><br>
    Você quer casar comigo? ❤️
  </div>

  <footer>
    Feito com amor 💕
  </footer>

</body>
</html>
