
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Nosso Amor 💖</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#ff4d6d,#ff99aa);
  color:white;
  text-align:center;
  overflow-x:hidden;
}

header{
  padding:30px;
  font-size:34px;
  font-weight:bold;
}

.sub{
  font-size:18px;
  margin-bottom:20px;
}

audio{
  margin:10px;
}

.galeria{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:12px;
  padding:20px;
  max-width:1100px;
  margin:auto;
}

.card{
  background:rgba(255,255,255,0.15);
  border-radius:15px;
  padding:8px;
}

.card img{
  width:100%;
  height:200px;
  object-fit:cover;
  border-radius:12px;
}

.legenda{
  font-size:13px;
  margin-top:6px;
}

.final{
  margin:40px 20px;
  background:rgba(255,255,255,0.15);
  padding:25px;
  border-radius:15px;
  max-width:700px;
  margin:auto;
}

button{
  padding:12px 25px;
  margin:10px;
  border:none;
  border-radius:10px;
  font-size:18px;
  cursor:pointer;
}

#sim{background:#00c853;color:white;}
#nao{background:#d50000;color:white;position:relative;}

#msg{
  margin-top:20px;
  font-size:22px;
  font-weight:bold;
}

.heart{
  position:fixed;
  font-size:24px;
  animation: subir 2s linear forwards;
}

@keyframes subir{
  0%{transform:translateY(0);opacity:1;}
  100%{transform:translateY(-250px);opacity:0;}
}
</style>
</head>

<body>

<header>💖 Nosso Amor 💖</header>
<div class="sub">Cada foto é um pedaço da nossa história</div>

<!-- 🎶 MÚSICA -->
<audio autoplay loop controls>
  <source src="musica.mp3" type="audio/mpeg">
</audio>

<!-- 📸 GALERIA -->
<div class="galeria">

<div class="card"><img src="2A34405E-3911-4894-8263-45CC66AFB038.jpeg"><div class="legenda">Nosso começo 💫</div></div>
<div class="card"><img src="3FD0D138-44AC-448C-81A1-61EFDAAFD035.jpeg"><div class="legenda">💞</div></div>
<div class="card"><img src="ACB7E092-0660-4BCE-8098-EE5DED814B5C.jpeg"><div class="legenda">😍</div></div>
<div class="card"><img src="IMG_2367.jpeg"><div class="legenda">✨</div></div>
<div class="card"><img src="IMG_2496.jpeg"><div class="legenda">💖</div></div>
<div class="card"><img src="IMG_3075.jpeg"><div class="legenda">💑</div></div>

</div>

<!-- 💍 FINAL -->
<div class="final">

<p>Eu só queria te fazer uma pergunta… 💍</p>

<button id="sim" onclick="sim()">SIM ❤️</button>
<button id="nao" onmouseover="foge()">NÃO 💔</button>

<div id="msg"></div>

</div>

<script>

function sim(){
  document.getElementById("msg").innerHTML =
  "EU TE AMO!!! ❤️💍<br>Você fez meu mundo mais feliz!";

  for(let i=0;i<50;i++){
    let h=document.createElement("div");
    h.className="heart";
    h.innerHTML="❤️";
    h.style.left=Math.random()*100+"vw";
    h.style.top="80%";
    document.body.appendChild(h);

    setTimeout(()=>h.remove(),2000);
  }
}

function foge(){
  let b=document.getElementById("nao");
  b.style.position="absolute";
  b.style.top=Math.random()*80+"%";
  b.style.left=Math.random()*80+"%";
}

</script>

</body>
</html>
